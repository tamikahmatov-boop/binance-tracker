name: Binance 10% Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Run tracker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Скачиваем цены
          curl -s https://api.binance.com/api/v3/ticker/price > /tmp/prices.json
          
          # Создаем Python скрипт
          cat > /tmp/analyze.py << 'EOF'
          import json, time, os
          from datetime import datetime
          
          BOT = os.environ['BOT_TOKEN']
          CHAT = os.environ['CHAT_ID']
          
          with open('/tmp/prices.json') as f:
              prices = json.load(f)
          
          try:
              with open('/tmp/history.json') as f:
                  history = json.load(f)
          except:
              history = {}
          
          now = time.time()
          up_signals = []
          down_signals = []
          
          for item in prices:
              symbol = item['symbol']
              if not symbol.endswith('USDT'):
                  continue
              
              try:
                  price = float(item['price'])
              except:
                  continue
              
              if symbol not in history:
                  history[symbol] = []
              
              history[symbol].append({'t': now, 'p': price})
              history[symbol] = [e for e in history[symbol] if e['t'] > now - 7200]
              
              if len(history[symbol]) >= 2:
                  old_price = history[symbol][0]['p']
                  age_min = (now - history[symbol][0]['t']) / 60
                  
                  if age_min >= 30:
                      change = (price - old_price) / old_price * 100
                      
                      if change >= 10:
                          up_signals.append(f"🟢 {symbol}: +{change:.2f}%")
                      elif change <= -10:
                          down_signals.append(f"🔴 {symbol}: {change:.2f}%")
          
          with open('/tmp/history.json', 'w') as f:
              json.dump(history, f)
          
          if up_signals or down_signals:
              msg = f"📊 {datetime.now().strftime('%H:%M')}\n\n"
              
              if up_signals:
                  msg += "🟢 РОСТ 10%+ за час:\n" + "\n".join(up_signals[:10])
              
              if down_signals:
                  if up_signals:
                      msg += "\n\n"
                  msg += "🔴 ПАДЕНИЕ 10%+ за час:\n" + "\n".join(down_signals[:10])
              
              import urllib.request
              url = f"https://api.telegram.org/bot{BOT}/sendMessage"
              data = json.dumps({
                  'chat_id': CHAT,
                  'text': msg,
                  'parse_mode': 'HTML'
              }).encode()
              
              req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'})
              urllib.request.urlopen(req)
              
              print(f"Sent: {len(up_signals)} up, {len(down_signals)} down")
          else:
              print("No signals")
          EOF
          
          python3 /tmp/analyze.py
