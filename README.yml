name: Binance 10% Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Run tracker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Получаем цены с Binance
          curl -s https://api.binance.com/api/v3/ticker/price > prices.json
          
          # Создаём Python скрипт
          cat > analyze.py << 'PYEOF'
          import json
          import time
          import os
          from datetime import datetime
          
          BOT = os.environ['BOT_TOKEN']
          CHAT = os.environ['CHAT_ID']
          
          # Загружаем цены
          with open('prices.json') as f:
              prices = json.load(f)
          
          # Загружаем историю
          try:
              with open('history.json') as f:
                  history = json.load(f)
          except:
              history = {}
          
          now = time.time()
          up_signals = []
          down_signals = []
          
          for item in prices:
              symbol = item['symbol']
              if not symbol.endswith('USDT'):
                  continue
              
              try:
                  price = float(item['price'])
              except:
                  continue
              
              if symbol not in history:
                  history[symbol] = []
              
              history[symbol].append({'t': now, 'p': price})
              
              # Удаляем старые записи (старше 2 часов)
              history[symbol] = [e for e in history[symbol] if e['t'] > now - 7200]
              
              if len(history[symbol]) >= 2:
                  old_price = history[symbol][0]['p']
                  age_minutes = (now - history[symbol][0]['t']) / 60
                  
                  # Проверяем только если есть 30+ минут данных
                  if age_minutes >= 30:
                      change = (price - old_price) / old_price * 100
                      
                      if change >= 10:
                          up_signals.append(f"🟢 {symbol}: +{change:.2f}%")
                      elif change <= -10:
                          down_signals.append(f"🔴 {symbol}: {change:.2f}%")
          
          # Сохраняем историю
          with open('history.json', 'w') as f:
              json.dump(history, f)
          
          # Отправляем уведомления
          if up_signals or down_signals:
              msg = f"📊 {datetime.now().strftime('%H:%M')}\n\n"
              
              if up_signals:
                  msg += "🟢 РОСТ 10%+ за час:\n" + "\n".join(up_signals[:10])
              
              if down_signals:
                  if up_signals:
                      msg += "\n\n"
                  msg += "🔴 ПАДЕНИЕ 10%+ за час:\n" + "\n".join(down_signals[:10])
              
              # Отправка через Telegram API
              import urllib.request
              telegram_url = f"https://api.telegram.org/bot{BOT}/sendMessage"
              data = json.dumps({
                  'chat_id': CHAT,
                  'text': msg,
                  'parse_mode': 'HTML'
              }).encode('utf-8')
              
              req = urllib.request.Request(
                  telegram_url,
                  data=data,
                  headers={'Content-Type': 'application/json'}
              )
              
              with urllib.request.urlopen(req) as response:
                  result = json.loads(response.read())
                  if result.get('ok'):
                      print(f"✅ Отправлено: {len(up_signals)} ростов, {len(down_signals)} падений")
                  else:
                      print(f"❌ Ошибка Telegram: {result}")
          else:
              print("✅ Проверка пройдена. Сигналов нет.")
          
          print(f"📊 Монет в истории: {len(history)}")
          PYEOF
          
          # Запускаем Python скрипт
          python3 analyze.py
